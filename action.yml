name: slopblock
description: Gate pull request merges behind a diff-grounded quiz for the PR author.
author: sampnorris
inputs:
  github-token:
    description: GitHub token with pull request, issues, checks, and contents permissions.
    required: true
  config-path:
    description: Path to the slopblock config file.
    required: false
    default: .github/slopblock.yml
  api-key:
    description: API key for an OpenAI-compatible endpoint.
    required: false
  base-url:
    description: Base URL for an OpenAI-compatible endpoint.
    required: false
  model:
    description: Model name for quiz generation and validation.
    required: false
  debug:
    description: Enable verbose logging.
    required: false
    default: "false"
outputs:
  outcome:
    description: Final outcome of the action run.
runs:
  using: node20
  main: dist/main.cjs
