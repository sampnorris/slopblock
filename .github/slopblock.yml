checkName: slopblock
retryMode: new_quiz

questionCount:
  min: 2
  max: 5

passRule:
  requireAllCorrect: true

contextBudget:
  maxRepoFiles: 250
  maxRepoMapEntries: 120
  maxSnippetFiles: 12
  maxSnippetChars: 12000

heuristics:
  tinyChangeMaxLines: 4
  skipForkPullRequests: true
  skipBots: true
  docsGlobs:
    - docs/
    - '**/*.md'
    - '**/*.mdx'
  testGlobs:
    - tests/
    - '**/*.test.'
    - '**/*.spec.'
  riskyGlobs:
    - auth/
    - api/
    - migrations/
    - .github/workflows/
